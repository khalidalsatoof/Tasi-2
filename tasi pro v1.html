// ══════════════════════════════════════════════════════════════
// نظام التقييم الموثق
// ══════════════════════════════════════════════════════════════
function score(s){
  // ══════════════════════════════════════════════════════════
  // نظام تقييم محدّث — مُعاير على 100 نقطة مباشرة
  // فني 35 | مالي 30 | محللون 20 | قطاعي 15
  // ══════════════════════════════════════════════════════════
  let T=0, F=0, A=0, Q=0
  const pos52=Math.round((s.price-s.low52)/(s.high52-s.low52||1)*100)
  const upside=((s.target-s.price)/s.price*100)
  const upsdPct=upside.toFixed(1)

  // ── فني (35 نقطة) ──────────────────────────────────────────
  // 1. RSI (0-10): أفضل ما بين 30-50
  if(s.rsi<30)      T+=9   // تشبع بيعي قوي
  else if(s.rsi<40) T+=10  // منطقة شراء ممتازة ★
  else if(s.rsi<50) T+=8   // جيد
  else if(s.rsi<55) T+=6   // محايد
  else if(s.rsi<65) T+=3   // مرتفع
  else              T+=0   // تشبع شرائي

  // 2. EMA Trend (0-10)
  const gc=s.ema50>s.ema200, pa50=s.price>s.ema50, pa20=s.ema20&&s.price>s.ema20
  if(gc&&pa50&&pa20)   T+=10
  else if(gc&&pa50)    T+=8
  else if(pa50)        T+=5
  else if(pa20)        T+=2
  else                 T+=0

  // 3. MACD (0-5)
  T += s.macd>0 ? 5 : 0

  // 4. موقع 52 أسبوع (0-5): قرب القاع = فرصة
  if(pos52<20)      T+=5
  else if(pos52<35) T+=4
  else if(pos52<55) T+=3
  else if(pos52<75) T+=1
  else              T+=0

  // 5. Bollinger (0-5)
  if(s.boll<20)      T+=5
  else if(s.boll<35) T+=4
  else if(s.boll<50) T+=3
  else if(s.boll<70) T+=1
  else               T+=0

  // ── مالي (30 نقطة) ─────────────────────────────────────────
  // 1. نمو الأرباح EPS (0-10) — الأهم
  if(s.eps_g>=25)      F+=10
  else if(s.eps_g>=15) F+=8
  else if(s.eps_g>=8)  F+=6
  else if(s.eps_g>=3)  F+=4
  else if(s.eps_g>=0)  F+=2
  else                 F+=0

  // 2. ROE (0-8)
  if(s.roe>=25)      F+=8
  else if(s.roe>=18) F+=6
  else if(s.roe>=12) F+=4
  else if(s.roe>=8)  F+=2
  else               F+=1

  // 3. توزيعات الأرباح (0-6)
  if(s.div>=5)       F+=6
  else if(s.div>=3)  F+=4
  else if(s.div>=1.5)F+=2
  else               F+=0

  // 4. P/E (0-4): أقل = أرخص
  if(s.pe<12)        F+=4
  else if(s.pe<16)   F+=3
  else if(s.pe<22)   F+=2
  else if(s.pe<28)   F+=1
  else               F+=0

  // 5. نسبة الدين (0-2)
  F += s.debt<0.35 ? 2 : s.debt<0.55 ? 1 : 0

  // ── آراء المحللين (20 نقطة) ────────────────────────────────
  // 1. نسبة الشراء (0-12)
  const totalA=(s.analysts_buy+s.analysts_sell)||1
  const buyPct=s.analysts_buy/totalA
  if(buyPct>=0.9)      A+=12
  else if(buyPct>=0.75)A+=9
  else if(buyPct>=0.5) A+=6
  else if(buyPct>=0.25)A+=3
  else                 A+=0

  // 2. Upside من الهدف (0-8)
  if(upside>=25)       A+=8
  else if(upside>=15)  A+=6
  else if(upside>=8)   A+=4
  else if(upside>=0)   A+=2
  else                 A+=0  // السعر فوق الهدف = سلبي

  // ── قطاعي (15 نقطة) ───────────────────────────────────────
  Q += Math.round(s.v2030/100*8)   // رؤية 2030 (0-8)
  Q += Math.min(7, s.sec_score)    // القطاع في الدورة (0-7)

  // ── المجموع النهائي (من 100) ───────────────────────────────
  const raw = T+F+A+Q  // max = 35+30+20+15 = 100
  const total = Math.min(100, raw)

  // عتبات التصنيف
  let rating,rc,rbg,rb,rk
  if(total>=72)     {rating="شراء قوي ⭐";rc="#10b981";rbg="rgba(16,185,129,.08)";rb="rgba(16,185,129,.3)";rk="STRONG_BUY"}
  else if(total>=58){rating="تراكم 📈";rc="#f59e0b";rbg="rgba(245,158,11,.07)";rb="rgba(245,158,11,.25)";rk="ACCUMULATE"}
  else if(total>=44){rating="انتظار ⏳";rc="#60a5fa";rbg="rgba(96,165,250,.06)";rb="rgba(96,165,250,.2)";rk="WAIT"}
  else              {rating="تجنب ⚠";rc="#ef4444";rbg="rgba(239,68,68,.06)";rb="rgba(239,68,68,.2)";rk="AVOID"}

  const sl=(s.price*0.92).toFixed(2)
  return{...s,T,F,AScore:A,Q,total,rating,rc,rbg,rb,rk,pos52,upsdPct,sl}
}

let DATA=STOCKS.map(score).sort((a,b)=>b.total-a.total)
let PORT=[], FILTER="ALL", TAB="a"

function updateStats(){
  document.getElementById('s1').textContent=DATA.filter(s=>s.rk==='STRONG_BUY').length
  document.getElementById('s2').textContent=DATA.filter(s=>s.rk==='ACCUMULATE').length
  document.getElementById('s3').textContent=DATA.filter(s=>s.rk==='WAIT').length
  document.getElementById('s4').textContent=DATA.filter(s=>s.rk==='AVOID').length
  document.getElementById('s5').textContent=PORT.length
  document.getElementById('tc').textContent=DATA.length

}

  return`<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
    <span style="font-size:7px;color:#6b7280;width:100px;flex-shrink:0">${l}</span>

      <div style="width:${Math.round(v/m*100)}%;height:100%;background:${c};border-radius:3px"></div>
    </div>
    <span style="font-size:8px;font-weight:600;color:${c};width:36px;text-align:left">${v}/${m}</span>
  </div>`
}

function addPort(sym){
  if(PORT.some(p=>p.sym===sym))return
  const s=DATA.find(d=>d.sym===sym)
  if(!s)return
  PORT.push({sym:s.sym,name:s.name,sec:s.sec,ep:s.price.toFixed(2),
    cp:s.price.toFixed(2),sl:s.sl,target:s.target,target_hi:s.target_hi,
    rating:s.rating,rc:s.rc,total:s.total,pnl:0,
    date:new Date().toLocaleDateString('ar-SA'),analyst_note:s.analyst_note})
  updateStats();renderGrid();renderPort()
  showTab('p',document.querySelectorAll('.tab')[1])
}

function rmPort(sym){
  PORT=PORT.filter(p=>p.sym!==sym)
  updateStats();renderPort();renderGrid()
}

    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;margin-bottom:7px">
      ${[['سعر الدخول',p.ep+' ر.س','#e2e8f0'],['وقف الخسارة',p.sl+' ر.س','#ef4444'],['هدف المحللين',p.target+' ر.س','#60a5fa'],['الهدف العالي',p.target_hi+' ر.س','#a78bfa'],['التقييم',p.total+'/100',p.rc],['تاريخ الإضافة',p.date,'#6b7280']].map(([l,v,c])=>`<div style="background:#080d18;border-radius:6px;padding:5px 6px;border:1px solid #0d1524"><div style="font-size:6px;color:#4b5563;margin-bottom:2px">${l}</div><div style="font-size:9px;color:${c};font-weight:600">${v}</div></div>`).join('')}
    </div>
    <div style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);border-radius:5px;padding:5px 8px;font-size:8px;color:#9ca3af">${p.analyst_note}</div>
  </div>`).join('')
}

function setF(f,btn){
  FILTER=f
  document.querySelectorAll('.fil').forEach(b=>b.className='fil')
  btn.className='fil on'
  renderGrid()
}
function showTab(t,btn){
  TAB=t
  document.getElementById('ap').style.display=t==='a'?'block':'none'
  document.getElementById('pp').style.display=t==='p'?'block':'none'
  document.querySelectorAll('.tab').forEach(b=>b.className='tab')
  btn.className='tab on'
}

updateStats();renderGrid();renderPort()
</script>
</body>
</html>
