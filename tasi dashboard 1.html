<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>TASI Investor - محفظة تاسي الاستثمارية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a10;color:#e2e8f0;font-family:'IBM Plex Mono',monospace;direction:rtl;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0e1a}::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}

/* Header */
#header{background:rgba(6,10,16,.97);border-bottom:1px solid #0d1524;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
#logo{font-size:15px;font-weight:700;letter-spacing:2px}
#logo span{color:#f59e0b}
#live-badge{font-size:7px;color:#f59e0b;border:1px solid #f59e0b33;border-radius:3px;padding:1px 4px;margin-right:5px}
#dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0}
#dot.active{box-shadow:0 0 8px #f59e0b;animation:pg 2s infinite}
#status-txt{font-size:9px;color:#4b5563;letter-spacing:1px;margin-right:8px}
#scan-btn{background:transparent;border:1px solid #1e2a3a;color:#6b7280;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:9px;font-family:inherit;transition:all .2s}
#scan-btn:hover{border-color:#374151;color:#9ca3af}

/* Progress */
#prog-bar{height:2px;background:#0d1524;display:none}
#prog-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);width:0%;transition:width .3s;box-shadow:0 0 8px #f59e0b55}

/* Main */
#main{padding:14px;max-width:1200px;margin:0 auto}

/* Stats */
#stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.stat{border-radius:10px;padding:10px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:700}
.stat-label{font-size:8px;color:#4b5563;margin-top:2px;letter-spacing:1px}

/* Tabs */
#tabs{display:flex;border-bottom:1px solid #0d1524;margin-bottom:14px;gap:0}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#4b5563;padding:7px 14px;cursor:pointer;font-size:10px;letter-spacing:1px;font-family:inherit;transition:all .2s}
.tab.active{color:#f59e0b;border-bottom:2px solid #f59e0b}

/* Filters */
#filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter{background:transparent;border:1px solid #0d1524;color:#4b5563;padding:4px 11px;border-radius:20px;cursor:pointer;font-size:9px;font-family:inherit;transition:all .2s}
.filter.active{background:#0d1524;border-color:#1e2a3a;color:#e2e8f0}

/* Grid */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* Card */
.card{border-radius:12px;padding:14px 15px;transition:transform .15s;cursor:default;animation:fi .3s ease forwards}
.card:hover{transform:translateY(-2px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-sym{font-size:14px;font-weight:700;letter-spacing:2px}
.card-name{font-size:9px;color:#6b7280;margin-top:2px}
.card-price{font-size:18px;font-weight:300;margin-top:3px}
.card-change{font-size:9px;margin-top:1px}
.rating-badge{border-radius:20px;padding:3px 9px;font-size:9px;font-weight:700;margin-top:5px;text-align:center}

/* Score */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.score-label{font-size:8px;color:#6b7280;width:70px;flex-shrink:0}
.score-bar-bg{flex:1;background:#0a0e1a;border-radius:3px;height:5px;overflow:hidden}
.score-bar{height:100%;border-radius:3px;transition:width .6s}
.score-val{font-size:8px;font-weight:600;width:24px;text-align:left}

/* Total Score */
.total-score{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #0d1524}
.total-label{font-size:9px;color:#6b7280}
.total-val{font-size:20px;font-weight:700}

/* Details grid */
.details{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.detail-box{background:#080d18;border-radius:5px;padding:5px 6px;border:1px solid #0d1524}
.detail-lbl{font-size:6px;color:#4b5563;margin-bottom:2px}
.detail-val{font-size:9px;font-weight:600}

/* Sector badge */
.sector{font-size:7px;color:#6b7280;background:#0a0e1a;border:1px solid #0d1524;border-radius:10px;padding:2px 7px;display:inline-block;margin-top:3px}

/* Loading */
#loading{text-align:center;padding:50px 20px}
#loading-title{font-size:14px;color:#f59e0b;margin-bottom:6px;letter-spacing:2px}
#loading-bar{background:#0d1524;border-radius:6px;height:6px;overflow:hidden;max-width:300px;margin:12px auto}
#loading-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);width:0%;transition:width .4s;border-radius:6px}
#loading-pct{font-size:10px;color:#374151;margin-top:6px}

/* Empty */
.empty{text-align:center;padding:40px;color:#1e2a3a;font-size:11px;letter-spacing:2px}

/* Portfolio tab */
#portfolio-list{display:flex;flex-direction:column;gap:10px}
.port-card{border-radius:11px;padding:12px 14px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.15)}
.port-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.port-sym{font-size:16px;font-weight:700;letter-spacing:2px}
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px}
.port-cell{background:#080d18;border-radius:6px;padding:6px 7px;border:1px solid #0d1524}
.port-cell-lbl{font-size:6px;color:#4b5563;margin-bottom:2px}
.port-cell-val{font-size:9px;font-weight:600}
.remove-btn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#ef4444;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:9px;font-family:inherit}
.alert-box{margin-top:8px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:7px 10px;font-size:10px;color:#ef4444}

@keyframes pg{0%,100%{box-shadow:0 0 6px #f59e0b}50%{box-shadow:0 0 16px #f59e0b}}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pr{0%,100%{box-shadow:0 0 6px #ef4444}50%{box-shadow:0 0 16px #ef4444}}
.pulse-r{animation:pr 1.5s infinite}
</style>
</head>

// ─── Score Calculation ─────────────────────────────────────────────
function calcEMA(arr, p) {
  if(arr.length<p) return null;
  const k=2/(p+1); let e=arr.slice(0,p).reduce((a,b)=>a+b)/p;
  for(let i=p;i<arr.length;i++) e=arr[i]*k+e*(1-k);
  return parseFloat(e.toFixed(2));
}
function calcRSI(closes, p=14) {
  if(closes.length<p+1) return 50;
  let g=0,l=0;
  for(let i=closes.length-p;i<closes.length;i++){const d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}
  return parseFloat((100-100/(1+g/(l||0.001))).toFixed(1));
}
function calcATR(candles, p=14) {
  const trs=[];
  for(let i=1;i<candles.length;i++) trs.push(Math.max(candles[i].h-candles[i].l,Math.abs(candles[i].h-candles[i-1].c),Math.abs(candles[i].l-candles[i-1].c)));
  const r=trs.slice(-p); return r.reduce((a,b)=>a+b,0)/r.length;
}
function calcMACD(closes) {
  const ema12=calcEMA(closes,12), ema26=calcEMA(closes,26);
  if(!ema12||!ema26) return {macd:0,signal:0,hist:0};
  const macd=ema12-ema26;
  return {macd:parseFloat(macd.toFixed(2)),hist:macd>0?1:-1};
}

function calcTechnicalScore(candles) {
  const closes=candles.map(c=>c.c);
  const price=closes.at(-1), prev52High=Math.max(...closes), prev52Low=Math.min(...closes);
  const rsi=calcRSI(closes);
  const ema50=calcEMA(closes,50), ema200=calcEMA(closes,200)||calcEMA(closes,closes.length-1);
  const ema20=calcEMA(closes,20);
  const macd=calcMACD(closes);
  const atr=calcATR(candles);
  const vol=candles.at(-1).v||0, avgVol=candles.slice(-20).reduce((a,c)=>a+(c.v||0),0)/20;
  const volRatio=avgVol>0?vol/avgVol:1;

  let score=0, details={};

  // 1. RSI (0-20)
  if(rsi<35){score+=20;details.rsi={val:rsi,score:20,label:"تشبع بيعي"}}
  else if(rsi<45){score+=15;details.rsi={val:rsi,score:15,label:"منطقة جيدة"}}
  else if(rsi<55){score+=10;details.rsi={val:rsi,score:10,label:"محايد"}}
  else if(rsi<65){score+=5;details.rsi={val:rsi,score:5,label:"مرتفع"}}
  else{score+=0;details.rsi={val:rsi,score:0,label:"تشبع شرائي"}}

  // 2. EMA Trend (0-20)
  const goldenCross=ema50&&ema200&&ema50>ema200;
  const priceAboveEMA=ema50&&price>ema50;
  if(goldenCross&&priceAboveEMA){score+=20;details.trend={score:20,label:"Golden Cross ✓"}}
  else if(priceAboveEMA){score+=13;details.trend={score:13,label:"فوق EMA50"}}
  else if(goldenCross){score+=8;details.trend={score:8,label:"Golden Cross"}}
  else{score+=3;details.trend={score:3,label:"اتجاه هابط"}}

  // 3. MACD (0-10)
  if(macd.hist>0){score+=10;details.macd={score:10,label:"إيجابي ↑"}}
  else{score+=2;details.macd={score:2,label:"سلبي ↓"}}

  // 4. موقع من 52 أسبوع (0-10)
  const pos52=(price-prev52Low)/(prev52High-prev52Low||1)*100;
  if(pos52<30){score+=10;details.pos52={val:Math.round(pos52),score:10,label:"قرب القاع"}}
  else if(pos52<50){score+=7;details.pos52={val:Math.round(pos52),score:7,label:"منطقة جيدة"}}
  else if(pos52<70){score+=4;details.pos52={val:Math.round(pos52),score:4,label:"متوسط"}}
  else{score+=1;details.pos52={val:Math.round(pos52),score:1,label:"قرب القمة"}}

  // 5. حجم التداول (0-5)
  if(volRatio>1.5){score+=5;details.vol={val:volRatio.toFixed(1),score:5,label:"حجم قوي"}}
  else if(volRatio>1){score+=3;details.vol={val:volRatio.toFixed(1),score:3,label:"حجم طبيعي"}}
  else{score+=1;details.vol={val:volRatio.toFixed(1),score:1,label:"حجم ضعيف"}}

  const change=parseFloat(((price-prev)/prev*100).toFixed(2));
  return {score,details,rsi,ema50,ema200,ema20,macd,pos52:Math.round(pos52),price,change,closes:closes.slice(-30),atr};
}

function calcFundamentalScore(stockInfo, technicalData) {
  // Since we can't get real financials for TASI easily,
  // we estimate based on sector, market cap, and vision2030 alignment
  let score=0, details={};

  // 1. رؤية 2030 (0-15)
  const v2030=stockInfo.vision2030;
  if(v2030>=90){score+=15;details.vision={val:v2030,score:15,label:"مستفيد رئيسي"}}
  else if(v2030>=80){score+=11;details.vision={val:v2030,score:11,label:"مستفيد جيد"}}
  else if(v2030>=70){score+=7;details.vision={val:v2030,score:7,label:"مستفيد"}}
  else{score+=3;details.vision={val:v2030,score:3,label:"محدود"}}

  // 2. حجم السوق (0-10)
  const mcapScore={ضخمة:10,كبيرة:7,متوسطة:4}[stockInfo.marketCap]||4;
  score+=mcapScore; details.mcap={score:mcapScore,label:stockInfo.marketCap};

  // 3. تقدير P/E بناءً على القطاع (0-10)
  const sectorPE={مصارف:9,طاقة:8,بتروكيماويات:6,اتصالات:10,تجزئة:7,عقارات:8,تأمين:7,تعليم:10,تقنية:10,تعدين:9};
  const peScore=sectorPE[stockInfo.sector]||7;
  score+=peScore; details.pe={score:peScore,label:"تقدير القطاع"};

  // 4. توزيعات الأرباح المتوقعة (0-10)
  const divSectors=["مصارف","طاقة","اتصالات","تعدين"];
  if(divSectors.includes(stockInfo.sector)){score+=10;details.div={score:10,label:"توزيعات جيدة"}}
  else{score+=5;details.div={score:5,label:"توزيعات محدودة"}}

  // 5. القطاع في الدورة (0-15)
  const hotSectors=["تقنية","تعليم","نقل ولوجستيات","مياه","اتصالات"];
  const goodSectors=["مصارف","طاقة","تعدين","عقارات"];
  if(hotSectors.includes(stockInfo.sector)){score+=15;details.cycle={score:15,label:"قطاع صاعد"}}
  else if(goodSectors.includes(stockInfo.sector)){score+=10;details.cycle={score:10,label:"قطاع مستقر"}}
  else{score+=5;details.cycle={score:5,label:"قطاع دوري"}}

  return {score,details};
}

function getRating(total) {
  if(total>=75) return {label:"شراء قوي ⭐",color:"#10b981",bg:"rgba(16,185,129,.1)",border:"rgba(16,185,129,.3)",key:"STRONG_BUY"};
  if(total>=60) return {label:"تراكم 📈",color:"#f59e0b",bg:"rgba(245,158,11,.08)",border:"rgba(245,158,11,.25)",key:"ACCUMULATE"};
  if(total>=45) return {label:"انتظار ⏳",color:"#60a5fa",bg:"rgba(96,165,250,.06)",border:"rgba(96,165,250,.2)",key:"WAIT"};
  return {label:"تجنب ⚠",color:"#ef4444",bg:"rgba(239,68,68,.06)",border:"rgba(239,68,68,.2)",key:"AVOID"};
}

async function fetchTASICandles(sym) {
  // TASI stocks use .SR suffix on Yahoo Finance
  const proxies=[
    `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}.SR?interval=1d&range=1y`)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}.SR?interval=1d&range=1y`)}`,
  ];
  for(const url of proxies){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(4000)});
      if(!r.ok) continue;
      let d=await r.json();
      if(d.contents) d=JSON.parse(d.contents);
      const result=d?.chart?.result?.[0];
      if(!result) continue;
      const q=result.indicators.quote[0];
      const candles=[];
      for(let i=0;i<q.close.length;i++){
        if(q.close[i]&&q.high[i]&&q.low[i]) candles.push({c:q.close[i],h:q.high[i],l:q.low[i],o:q.open[i]||q.close[i],v:q.volume[i]||0});
      }
      if(candles.length>=20) return candles;
    }catch{continue;}
  }
  return null;
}

// ─── State ──────────────────────────────────────────────────────────
let stocks=[], portfolio=[], activeFilter="ALL", activeTab="analysis";

async function startScan(){
  if(document.getElementById('scan-btn').textContent==='جاري...') return;
  document.getElementById('scan-btn').textContent='جاري...';
  document.getElementById('prog-bar').style.display='block';
  document.getElementById('loading').style.display='block';
  document.getElementById('content').style.display='none';
  const dot=document.getElementById('dot');
  dot.className='active';

  const results=[];
  let done=0;
  const BATCH=8; // تحليل 8 أسهم بالتوازي

  function processStock(info, candles){
    // إذا فشل جلب البيانات، نحلل بالمعطيات المالية فقط
    if(!candles || candles.length<20){
      const fund=calcFundamentalScore(info,{score:0});
      const totalFund=Math.round(fund.score/60*40);
      const vision2030Score=Math.round(info.vision2030/100*20);
      const total=Math.min(100,totalFund+vision2030Score);
      const rating=getRating(total);
      // بيانات تقديرية
      const estPrice={"2222":28,"1180":32,"1120":97,"2010":65,"7010":42,"1211":26,"4280":135,"1150":25,"1160":28,"1030":42}[info.sym]||50;
      return {
        ...info,price:estPrice,change:0,rsi:50,ema50:null,ema200:null,ema20:null,
        macd:{hist:0},pos52:50,closes:[],atr:1,
        fundDetails:fund.details,total,rating,
        techRaw:0,fundRaw:fund.score,estimated:true
      };
    }
    const tech=calcTechnicalScore(candles);
    const fund=calcFundamentalScore(info,tech);
    const totalTech=Math.round(tech.score/65*40);
    const totalFund=Math.round(fund.score/60*40);
    const vision2030Score=Math.round(info.vision2030/100*20);
    const total=Math.min(100,totalTech+totalFund+vision2030Score);
    const rating=getRating(total);
    return {...info,...tech,fundDetails:fund.details,total,rating,techRaw:tech.score,fundRaw:fund.score,estimated:false};
  }

  for(let i=0;i<TASI_STOCKS.length;i+=BATCH){
    const batch=TASI_STOCKS.slice(i,i+BATCH);
    const batchResults=await Promise.all(batch.map(async info=>{
      document.getElementById('loading-pct').textContent=`${Math.round(done/TASI_STOCKS.length*100)}% · ${info.name}`;
      const candles=await fetchTASICandles(info.sym);
      done++;
      const pct=Math.round(done/TASI_STOCKS.length*100);
      document.getElementById('prog-fill').style.width=pct+'%';
      document.getElementById('loading-fill').style.width=pct+'%';
      return processStock(info,candles);
    }));
    batchResults.forEach(r=>r&&results.push(r));
    if(i+BATCH<TASI_STOCKS.length) await new Promise(r=>setTimeout(r,200));
  }

  results.sort((a,b)=>b.total-a.total);
  stocks=results;

  // Update portfolio
  portfolio=portfolio.map(p=>{
    const u=results.find(s=>s.sym===p.sym);
    if(!u) return p;
    const pnl=+((u.price-p.entryPrice)/p.entryPrice*100).toFixed(2);
    return {...p,currentPrice:u.price,pnl,rating:u.rating,total:u.total};
  });

  updateStats();
  renderStocks();
  renderPortfolio();

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('loading-fill').style.width='100%';
  document.getElementById('status-txt').textContent=`تم تحليل ${results.length} شركة · ${new Date().toLocaleTimeString('ar-SA')}`;
  dot.className='';
  document.getElementById('scan-btn').textContent='⟳ تحليل';
}

function updateStats(){
  document.getElementById('s-strong').textContent=stocks.filter(s=>s.rating.key==='STRONG_BUY').length;
  document.getElementById('s-accum').textContent=stocks.filter(s=>s.rating.key==='ACCUMULATE').length;
  document.getElementById('s-wait').textContent=stocks.filter(s=>s.rating.key==='WAIT').length;
  document.getElementById('s-avoid').textContent=stocks.filter(s=>s.rating.key==='AVOID').length;
  document.getElementById('s-port').textContent=portfolio.length;
  document.getElementById('tab-count').textContent=stocks.length;
  document.getElementById('tab-port-count').textContent=portfolio.length;
}

function scoreBar(label,val,max,color){
  const pct=Math.round(val/max*100);
  return `<div class="score-row">
    <span class="score-label">${label}</span>
    <div class="score-bar-bg"><div class="score-bar" style="width:${pct}%;background:${color}"></div></div>
    <span class="score-val" style="color:${color}">${val}/${max}</span>
  </div>`;
}

function renderStocks(){
  const filtered=stocks.filter(s=>activeFilter==='ALL'||s.rating.key===activeFilter);
  document.getElementById('filter-count').textContent=filtered.length+' شركة';
  const grid=document.getElementById('grid');
  if(filtered.length===0){grid.innerHTML='<div class="empty">لا توجد نتائج</div>';return;}

  grid.innerHTML=filtered.map((s,idx)=>{
    const rt=s.rating;
    const inPort=portfolio.some(p=>p.sym===s.sym);
    const techScore=Math.round(s.techRaw/65*40);
    const fundScore=Math.round(s.fundRaw/60*40);
    const visionScore=Math.round(s.vision2030/100*20);

    return `<div class="card" style="animation-delay:${idx*.02}s;background:${rt.bg};border:1px solid ${rt.border}">
      <div class="card-top">
        <div>
          <div class="card-sym">${s.sym}</div>
          <div class="card-name">${s.name}</div>
          <div class="sector">${s.sector}</div>
          <div class="card-price" style="color:${rt.color}">${s.price?.toFixed(2)||'–'} ر.س ${s.estimated?'<span style="font-size:7px;color:#6b7280;background:#0a0e1a;border:1px solid #1e2a3a;border-radius:3px;padding:1px 4px">تقديري</span>':''}</div>
          <div class="card-change" style="color:${s.change>=0?'#10b981':'#ef4444'}">${s.change>=0?'▲':'▼'} ${Math.abs(s.change||0)}%</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <div style="font-size:28px;font-weight:700;color:${rt.color}">${s.total}</div>
          <div style="font-size:8px;color:#6b7280">/ 100</div>
          <div class="rating-badge" style="background:${rt.color}18;border:1px solid ${rt.color}44;color:${rt.color}">${rt.label}</div>
        </div>
      </div>

      <div style="margin-bottom:8px">
        ${scoreBar('فني (40)',techScore,40,'#60a5fa')}
        ${scoreBar('مالي (40)',fundScore,40,'#10b981')}
        ${scoreBar('رؤية 2030 (20)',visionScore,20,'#f59e0b')}
      </div>

      <div class="details">
        <div class="detail-box">
          <div class="detail-lbl">RSI</div>
          <div class="detail-val" style="color:${s.rsi<40?'#10b981':s.rsi>60?'#ef4444':'#f59e0b'}">${s.rsi}</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">MACD</div>
          <div class="detail-val" style="color:${s.macd?.hist>0?'#10b981':'#ef4444'}">${s.macd?.hist>0?'إيجابي ↑':'سلبي ↓'}</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">موقع 52 أسبوع</div>
          <div class="detail-val" style="color:${s.pos52<30?'#10b981':s.pos52>70?'#ef4444':'#f59e0b'}">${s.pos52}%</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">EMA50</div>
          <div class="detail-val" style="color:${s.ema50&&s.price>s.ema50?'#10b981':'#ef4444'}">${s.ema50||'–'}</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">رؤية 2030</div>
          <div class="detail-val" style="color:#f59e0b">${s.vision2030}%</div>
        </div>
        <div class="detail-box">
          <div class="detail-lbl">حجم السوق</div>
          <div class="detail-val" style="color:#a78bfa">${s.marketCap}</div>
        </div>
      </div>

      ${rt.key==='STRONG_BUY'||rt.key==='ACCUMULATE'?`
      <button onclick="addToPortfolio('${s.sym}')" ${inPort?'disabled':''} style="width:100%;margin-top:8px;padding:6px;background:${inPort?'transparent':'rgba(16,185,129,.08)'};border:1px solid ${inPort?'#1e2a3a':'rgba(16,185,129,.25)'};color:${inPort?'#374151':'#10b981'};border-radius:6px;cursor:${inPort?'default':'pointer'};font-size:9px;font-weight:600;font-family:inherit;letter-spacing:1px">
        ${inPort?'✓ في محفظتك':'+ أضف للمحفظة'}
      </button>`:''}
    </div>`;
  }).join('');
}

function addToPortfolio(sym){
  if(portfolio.find(p=>p.sym===sym)) return;
  const s=stocks.find(s=>s.sym===sym);
  if(!s) return;
  portfolio.push({sym:s.sym,name:s.name,sector:s.sector,entryPrice:s.price,currentPrice:s.price,entryDate:new Date().toLocaleDateString('ar-SA'),pnl:0,rating:s.rating,total:s.total,targetReturn:15,stopLoss:s.price*(1-0.08)});
  updateStats(); renderStocks(); renderPortfolio();
  switchTab('portfolio');
}

function removeFromPortfolio(sym){
  portfolio=portfolio.filter(p=>p.sym!==sym);
  updateStats(); renderPortfolio(); renderStocks();
}

function renderPortfolio(){
  const list=document.getElementById('portfolio-list');
  if(portfolio.length===0){list.innerHTML='<div class="empty">محفظتك فارغة<br><span style="font-size:9px;display:block;margin-top:6px">أضف أسهم من تحليل السوق</span></div>';return;}

  const totalInvested=portfolio.reduce((a,p)=>a+p.entryPrice,0);
  const avgPnl=portfolio.reduce((a,p)=>a+p.pnl,0)/portfolio.length;

  list.innerHTML=`<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
    <div><div style="font-size:18px;font-weight:700;color:#f59e0b">${portfolio.length}</div><div style="font-size:8px;color:#6b7280">أسهم في المحفظة</div></div>
    <div><div style="font-size:18px;font-weight:700;color:${avgPnl>=0?'#10b981':'#ef4444'}">${avgPnl>=0?'+':''}${avgPnl.toFixed(1)}%</div><div style="font-size:8px;color:#6b7280">متوسط الأداء</div></div>
    <div><div style="font-size:18px;font-weight:700;color:#a78bfa">${portfolio.filter(p=>p.pnl>=0).length}/${portfolio.length}</div><div style="font-size:8px;color:#6b7280">رابحة/إجمالي</div></div>
  </div>`+
  portfolio.map(p=>{
    const isAlert=p.currentPrice<=p.stopLoss;
    return `<div class="port-card ${isAlert?'pulse-r':''}" style="${isAlert?'background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.3)':''}">
      <div class="port-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="port-sym">${p.sym}</span>
          <span style="font-size:9px;color:#6b7280">${p.name}</span>
          <span class="rating-badge" style="background:${p.rating.color}15;border:1px solid ${p.rating.color}33;color:${p.rating.color};font-size:8px;padding:2px 7px">${p.rating.label}</span>
        </div>
        <button class="remove-btn" onclick="removeFromPortfolio('${p.sym}')">✕ حذف</button>
      </div>
      <div class="port-grid">
        <div class="port-cell"><div class="port-cell-lbl">سعر الدخول</div><div class="port-cell-val" style="color:#e2e8f0">${p.entryPrice?.toFixed(2)} ر.س</div></div>
        <div class="port-cell"><div class="port-cell-lbl">السعر الحالي</div><div class="port-cell-val" style="color:${p.pnl>=0?'#10b981':'#ef4444'}">${p.currentPrice?.toFixed(2)} ر.س</div></div>
        <div class="port-cell"><div class="port-cell-lbl">ربح/خسارة</div><div class="port-cell-val" style="color:${p.pnl>=0?'#10b981':'#ef4444'}">${p.pnl>=0?'+':''}${p.pnl?.toFixed(2)}%</div></div>
        <div class="port-cell"><div class="port-cell-lbl">وقف الخسارة</div><div class="port-cell-val" style="color:#ef4444">${p.stopLoss?.toFixed(2)} ر.س</div></div>
        <div class="port-cell"><div class="port-cell-lbl">الهدف</div><div class="port-cell-val" style="color:#10b981">+${p.targetReturn}%</div></div>
        <div class="port-cell"><div class="port-cell-lbl">تاريخ الدخول</div><div class="port-cell-val" style="color:#a78bfa">${p.entryDate}</div></div>
        <div class="port-cell"><div class="port-cell-lbl">تقييم الآن</div><div class="port-cell-val" style="color:${p.rating.color}">${p.total}/100</div></div>
        <div class="port-cell"><div class="port-cell-lbl">القطاع</div><div class="port-cell-val" style="color:#6b7280">${p.sector}</div></div>
      </div>
      ${isAlert?`<div class="alert-box">🛑 وصل السعر لوقف الخسارة — راجع القرار</div>`:''}
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderStocks();
}

function switchTab(t){
  activeTab=t;
  document.getElementById('analysis-panel').style.display=t==='analysis'?'block':'none';
  document.getElementById('portfolio-panel').style.display=t==='portfolio'?'block':'none';
  document.getElementById('tab-analysis').className='tab'+(t==='analysis'?' active':'');
  document.getElementById('tab-portfolio').className='tab'+(t==='portfolio'?' active':'');
}

startScan();
</script>
